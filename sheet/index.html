				return clamped_modifier;
			};
			
			const stat_to_modifier_hp_formula = (val) => {
				const base_modifier = Math.floor(stat_to_modifier_formula(val) / 2);
				const clamped_modifier = clamp(base_modifier, MIN_STAT_MODIFIER, MAX_STAT_MODIFIER);
				return clamped_modifier;
			};
			
			
			const max_hp_formula = (poke_level, poke_class) => {
				const class_hp_base = poke_class.startingHP
				const class_hp_increase = poke_class.levelHP
			
				const max_hp = class_hp_base + class_hp_increase * Math.max(poke_level - 1, 0);
			
				return max_hp;
			};
			
			const max_adventure_token_formula = (poke_level) => {
				const modifier = poke_level + 1
				const clamped_modifier = clamp(modifier, 1, Infinity);
				return clamped_modifier;
			};
			
			
			const speed_modifier_to_battle_formula = (speed_modifier, proficiency_bonus) => {
				const base_movement = Math.floor(speed_modifier / 2) + 1;
				const clamped_movement = clamp(base_movement, MIN_STAT_MODIFIER, MAX_STAT_MODIFIER);
				const boosted_movement = clamped_movement + proficiency_bonus;
			
				return boosted_movement;
			};

			async function fetchAndExec(url) { const res = await fetch(url); const text = await res.text(); const exportsObj = {}; new Function("exports", text)(exportsObj); return exportsObj; }
			async function loadExternalData() {
				console.info("Loading external data...");
			
				const results = {};

				for (const [key, cfg] of Object.entries(DATA_SOURCES)) {

				// --- Step 1: load all "raw sources" in parallel ---
				await Promise.all(
					Object.entries(DATA_SOURCES)
						.filter(([_, cfg]) => cfg.url)
						.map(async ([key, cfg]) => {
							const data = cfg.type === "text"
								? await fetch(cfg.url).then(r => r.text())
								: await fetchAndExec(cfg.url);
			
							results[key] = cfg.transform(data);

				);
			
				// --- Step 2: resolve derived values (like pokemon_names) ---
				for (const [key, cfg] of Object.entries(DATA_SOURCES)) {
					if (!cfg.from) continue;
			
					results[key] = cfg.transform(results[cfg.from]);
					console.info(`${key} derived`);

				// --- Step 3: expose globally ---
				Object.assign(globalThis, results);
			
				console.info("All data loaded:", results);

			function parseTSVToObjects(text) {
				const [head, ...lines] = text.split('\n');
			
				const headers = head
					.split('\t')
					.map(h =>
						h
						.replace(/\[|\]/g, '')
						.trim()
						.toLowerCase()
						.replace(/\s+/g, '_')
					);
			
				return lines
					.filter(l => l && !l.startsWith(head))
					.map(l => {
						const obj = {};
						l.split('\t').forEach((v, i) => {
							v = v?.trim();
							if (v) obj[headers[i]] = v;
						});
						return obj;
					})
					.filter(o => Object.keys(o).length);
			}

			function verifyTypeConsistency() {
				const colorTypes = new Set(Object.keys(type_colors));
				const effectTypes = new Set(Object.keys(type_effect_lookup));
				const pokedexTypes = new Set(
					Object.values(pokemon_list)
					.flatMap(p => p.types || [])
					.map(t => t?.toLowerCase())
					.filter(Boolean)
				);
			
				const allTypes = new Set([...colorTypes, ...effectTypes, ...pokedexTypes]);
			
				const missing = src => [...allTypes].filter(t => !src.has(t));
			
				const missingInColors = missing(colorTypes);
				const missingInEffects = missing(effectTypes);
				const missingInPokedex = missing(pokedexTypes);
			
				console.info(
					"Missing in type_colors:", missingInColors,
					"\nMissing in type_effect_lookup:", missingInEffects,
					"\nMissing in pokedex:", missingInPokedex
				);
			
				// VALID types = only those present in ALL sources
				const validTypes = [...allTypes].filter(
					t => colorTypes.has(t) && effectTypes.has(t) && pokedexTypes.has(t)
				);
			
				const validSet = new Set(validTypes);
			
				// --- CLEAN type_colors ---
				for (const k in type_colors)
					if (!validSet.has(k)) delete type_colors[k];
			
			
				// --- CLEAN type_effect_lookup ---
				for (const k in type_effect_lookup) {
					if (!validSet.has(k)) delete type_effect_lookup[k];
					else {
						for (const k2 in type_effect_lookup[k])
							if (!validSet.has(k2)) delete type_effect_lookup[k][k2];
					}
				}
			
				// --- CLEAN pokemon_list types ---
				for (const p of Object.values(pokemon_list)) {
					if (!p.types) continue;
					p.types = p.types.map(t => t?.toLowerCase()).filter(t => validSet.has(t));
				}
			
				console.info("Final valid types:", Object.keys(type_effect_lookup));
			}

			/***************INPUT FUNCTIONS*************************/
			
			function capitalizeWords(str) {
				if (!str) return str;
				return str
					.toLowerCase()
					.split(" ")
					.map(word => word.charAt(0).toUpperCase() + word.slice(1))
					.join(" ");
			}
			
			const normalizeValue = (v) => {
				if (v == null) return v;
			
			
				// Remove invisible / zero-width / control characters
				// \u200B = zero-width space
				// \u200C = zero-width non-joiner
				// \u200D = zero-width joiner
				// \uFEFF = BOM / zero-width no-break space
				// \u2060 = word joiner
				// \u2061-\u2064 = other formatting chars
				v = v.replace(/[\u200B-\u200D\uFEFF\u2060-\u2064]/g, "").trim();

			function generateEmojiSet() {

					[0x1F600, 0x1F64F], // emoticons
					[0x1F680, 0x1F6FF], // transport & map
					[0x1F700, 0x1F77F], // alchemical
					[0x1F780, 0x1F7FF], // geometric extended
					[0x1F800, 0x1F8FF],
					[0x1F900, 0x1F9FF], // supplemental symbols
					[0x1FA00, 0x1FAFF], // extended-A
				];
			
				for (const [start, end] of ranges) {
					for (let cp = start; cp <= end; cp++) {
						const char = String.fromCodePoint(cp);
			
						// Filter out problematic ones (very basic filter)
						if (!/\uFE0F/.test(char)) {
							emojis.push(char);
							if (emojis.length === 1024) return emojis;
						}
					}
				}
			
				if (emojis.length < 1024) {
					throw new Error("Not enough emojis collected");
				}
			
				return emojis;
			}

			// --- ENCODE: Uint8Array → emoji string ---
			function encodeEmoji(bytes) {
				let buffer = 0;
				let bits = 0;
				let output = "";
			
				for (let i = 0; i < bytes.length; i++) {
					buffer = (buffer << 8) | bytes[i];
					bits += 8;
			
					while (bits >= 10) {
						bits -= 10;
						const index = (buffer >> bits) & 0x3FF; // 1023
						output += EMOJI_SET[index];
					}
				}
			
				// Remaining bits
				if (bits > 0) {
					const index = (buffer << (10 - bits)) & 0x3FF;
					output += EMOJI_SET[index];
				}
			
				return output;
			}

			function decodeEmoji(str) {
				const chars = Array.from(decodeURIComponent(str));
			
				let buffer = 0;
				let bits = 0;
				const bytes = [];
			
				for (let ch of chars) {
					const value = EMOJI_MAP.get(ch);
					if (value === undefined) {
						throw new Error("Invalid emoji in input");
					}
			
					buffer = (buffer << 10) | value;
					bits += 10;
			
					while (bits >= 8) {
						bits -= 8;
						const byte = (buffer >> bits) & 0xFF;
						bytes.push(byte);
					}
				}
			
				return new Uint8Array(bytes);
			}

			function computeAutoMath(raw) {
				if (typeof raw !== "string") {
					return { eligible: false, result: null };
				}
			
				const value = raw.trim();
			
				// must only contain safe characters
				const isValidMath = /^[0-9+\-().\s]+$/.test(value);
			
				// must contain at least one real operation between numbers
				const hasRealOperation = /[0-9]\s*[+\-]\s*[0-9]/.test(value);
			
				if (!isValidMath || !hasRealOperation) {
					return { eligible: false, result: null };
				}
			
				try {
					const result = Function(`"use strict"; return (${value})`)();
			
					if (typeof result === "number" && isFinite(result)) {
						return { eligible: true, result };
					}
				} catch (e) {
					// ignore invalid expressions
				}
			
				return { eligible: false, result: null };
			}

						const listId = `${this.id}_input2_list`;
						const datalist = document.createElement("datalist");
						datalist.id = listId;
						allowed.forEach((val) => {
							const option = document.createElement("option");
							option.value = val;
							datalist.appendChild(option);
						});
						proficiency_box.setAttribute("list", listId);
						this.appendChild(datalist);
					} 
			
					if (type.includes("vision-box")) {
						this.classList.add("vision-box");
						this.vision_div = document.createElement("div");
						const vision_value = this._createInput("", "vision_value");
						
this.second_label = document.createElement("label");
this.second_label.classList.add("vision-label")
this.vision_div.classList.add("vision-div")
this.second_label.textContent ="tiles" //"↱tiles"
this.vision_div.appendChild(this.second_label);
this.vision_div.appendChild(vision_value);
this.wrapper.appendChild(this.vision_div);

						vision_value.customType = "number"
						}
			
			
			
					/***************** Input Content *****************/
			
					this.inputs[0]?.setAttribute("list", this.datalist.id);
			
			if (type.includes("number")) {
				this.inputs[0].customType = "number" ;
			}
			  this.inputs.forEach(input => {
			    // Use text so we can support expressions
				if(input.customType == "number"){
			    input.type = "text";
			
			    // Suggest a keyboard that shows numbers + math-friendly symbols
				//input.inputMode = "decimal"; //On android, did not show a + symbol on the keyboard
			    input.inputMode = "tel";
			
			    input.autocomplete = "off";
			  }});
			
			
					/***************** Input Shape *****************/
			
			
					if (type.includes("square")) {
						this.classList.add("square");
					}
			
					if (type.includes("wide")) {
						this.classList.add("wide");
					}
			
					if (type.includes("tall")) {
						this.classList.add("tall");
					}
			
					if (type.includes("short")) {
						this.classList.add("short");
					}
			
					if (type.includes("image-box")) {
						this.classList.add("image-box");
					}
					
					if (type.includes("pkm-type-name")) {
						this.inputs[0].classList.add("pkm-type-name");
					}
					
					
			
					this._defineAccessors();
			
				}
			
			
				_handleCheckboxLogic(index, isChecked) {
					if (typeof index !== "number" || Number.isNaN(index)) return;
			
			
					for (let i = 0; i < this.inputs.length; i++) {
						this.inputs[i].checked = i < index || (i === index && (isChecked || this.inputs[i + 1]?.checked));
					}
			
					if (!this.inputs[index].checked) {
						index -= 1
					}
			
					if (index < 0) index = ""
			
					this.inputs[0].value = index;
					updateGlobalStatus();
				}
			
			
				_defineAccessors() {
					// 1. Index-based accessors
					this.inputs.forEach((_, index) => {
						const name = index === 0 ?
							"primaryValue" :
							index === 1 ?
							"secondaryValue" :
							`value${index + 1}`;
			
						Object.defineProperty(this, name, {
							get: () => this.inputs[index].value,
							set: (val) => this._setValue(index, val, true),
						});
					});
			
					// 2. ID-based accessors 
					this.inputs.forEach((input, index) => {
						const id = input.id;
			
						if (!id) return; // skip inputs without id
			
						// avoid overwriting existing properties
						if (this.hasOwnProperty(id)) return;
			
						Object.defineProperty(this, id, {
							get: () => this.inputs[index].value,
							set: (val) => this._setValue(index, val, true),
						});
					});
				}
			
				_createInput(type, id) {
					const input = document.createElement(type || "input");
			
					// Assign id only if provided
					if (typeof id === "string" && id.length > 0) {
						input.id = id;
					}
			
					input._autoFilled = false;
			
					input._mathTimeout = null;
			
					this.inputs.push(input);
			
					const index = this.inputs.length - 1;
			
					input.classList.add("input" + index);
			
					input.addEventListener("input", () => {
						input._autoFilled = false;
						this._setValue(index, "", false);
						updateGlobalStatus();
					});
			
					this.wrapper.append(input);
			
					return input;
				};
			
			_removeInput(index) {
			  const input = this.inputs[index];
			  if (!input) return;
			
			  // Remove from DOM
			  input.remove();
			
			  // Remove from array
			  this.inputs.splice(index, 1);
			
			  // Re-index remaining inputs so class names stay consistent
			  this.inputs.forEach((inp, i) => {
			    inp.classList.remove(...[...inp.classList].filter(c => c.startsWith("input")));
			    inp.classList.add("input" + i);
			  });
			}
			
			_setValue(index, value, auto = true) {
				const input = this.inputs[index];
				if (!input) return;
			
				// Save computed font size from CSS (not inline)
				const originalFontSize = window.getComputedStyle(input).fontSize;
			
			
				// Helper function to adjust font size (textarea only)
				const adjustFontSize = () => {
					if (input.tagName.toLowerCase() !== "textarea") return;
			
					const maxHeight = input.offsetHeight;
			
					input.style.fontSize = "";
			
					let fontSize = parseInt(window.getComputedStyle(input).fontSize, 10);
			
					while (input.scrollHeight > maxHeight && fontSize > 8) {
						fontSize -= 1;
						input.style.fontSize = `${fontSize}px`;
					}
				};
			
				// Set value if auto-filled or empty
				if (input._autoFilled || input.value === "") {
					input.value = value;
					input._autoFilled = auto;
					input.scrollLeft = 0;
				}
				
			
			if (input.customType?.includes("number")) {
				input.value = input.value.replace(/[^0-9+\-().\s]/g, "");
			}
				
			
				// =========================
				// AUTOMATH ( + and - only )
				// =========================
				const math = computeAutoMath(input.value);
					clearTimeout(input._mathTimeout);
			
				input.classList.remove("automath-ready");
				
				if (math.eligible) {
					input.classList.add("automath-ready");
					input._mathTimeout = setTimeout(() => {
						const original = input.value;
			
						if (math.result !== null && math.result !== original) {
							input.value = math.result;
							input.classList.remove("automath-ready");
							updateGlobalStatus();
						}
					}, 900);
				}
			
			
				input.toggleAttribute("auto-filled", input._autoFilled);
			
				adjustFontSize();
			
				if (input.type === "checkbox" && index === 0) {
					this._handleCheckboxLogic(value, true);
				}
				
				
				if (input.classList.contains("pkm-type-name")){
				input.style.setProperty('--type-color', `var(--type-${input.value.toLowerCase()})`);
				}
				
				
				
			}
			
			
				update() {
					this._onUpdateFN(this);
				}
			
			
				setSuggestions(list) {
					if (!Array.isArray(list)) return
					if (arraysEqual(this.suggestions, list)) return;
			
					this.suggestions = list;
			
					if (!this.datalist) return;
			
					this.datalist.innerHTML = "";
			
					list.forEach((value) => {
						const option = document.createElement("option");
						option.value = value;
						this.datalist.appendChild(option);
					});
				}
			
			
				renderTable(data = {}) {
					if (!this.table) return;
			
					this.table.innerHTML = "";
			
					Object.entries(data).forEach(([type, value]) => {
						const row = document.createElement("tr");
			
						const td1 = document.createElement("td");
						const td2 = document.createElement("td");
			
						td1.textContent = type;
						td2.textContent = value;
			
			
						td1.classList.add("type-name");
						td1.classList.add("pkm-type-name")
						td1.style.setProperty('--type-color', `var(--type-${type.toLowerCase()})`);
			
						row.appendChild(td1);
						row.appendChild(td2);
						this.table.appendChild(row);
					});
				}
			
			
			}
			
			customElements.define("labeled-input", LabeledInput);
			
			/*****************************************************************************/
			
			/*****************************************************************************/
			class ArrowConnector extends HTMLElement {
				static get observedAttributes() {
					return ["from", "to"];
				}
			
				constructor() {
					super();
					this.svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
					this.appendChild(this.svg);
				}
			
				connectedCallback() {
					window.addEventListener("resize", () => this.update());
					document.addEventListener("DOMContentLoaded", () => this.update());
					document.fonts?.ready?.then(() => this.update());
			
			
				}
			
				attributeChangedCallback() {
					this.update();
				}
			
				update() {
					if (!this.svg) return;
			
			
					// DOM not ready
					if (document.readyState !== "interactive" &&
						document.readyState !== "complete") return;
			
					// Fonts not ready
					if (document.fonts && document.fonts.status !== "loaded") return;
			
					this.svg.replaceChildren();
			
					const fromSel = this.getAttribute("from");
					const toSel = this.getAttribute("to");
					if (!fromSel || !toSel || toSel === fromSel) return;
			
					const container = this.offsetParent || this.parentElement;
					if (!container) return;
			
					const containerRect = container.getBoundingClientRect();
			
					const fromElRaw = container.querySelector(fromSel);
					if (!fromElRaw) return;
			
					const toElementsRaw = toSel
						.split(",")
						.map(sel => container.querySelector(sel.trim()))
						.filter(Boolean);
			
					if (!toElementsRaw.length) return;
			
			
					const styles = getComputedStyle(this);
			
			
					const padding = parseFloat(styles.getPropertyValue("--arrow-padding")) || 0;
			
			
					const getCenterBottom = el => {
						const r = el.getBoundingClientRect();
						return {
							x: r.left + r.width / 2 - containerRect.left,
							y: r.bottom - containerRect.top + padding
						};
					};
			
					const getCenterTop = el => {
						const r = el.getBoundingClientRect();
						return {
							x: r.left + r.width / 2 - containerRect.left,
							y: r.top - containerRect.top - padding
						};
					};
			
					const start = getCenterBottom(fromElRaw);
			
					// Resolve targets
					const targets = toElementsRaw.map(el => {
						return {
							el: el,
							end: getCenterTop(el)
						};
					});
			
					// ---- CONFIG ----
			
					const shortThreshold = parseFloat(styles.getPropertyValue("--arrow-short-threshold")) || 100;
					const midRatio = parseFloat(styles.getPropertyValue("--arrow-mid-ratio")) || 0.5;
			
					// ---- SHARED MID Y (for long arrows) ----
					const lowestEndY = Math.max(...targets.map(t => t.end.y));
			
					// midpoint between start and lowest target, biased by ratio
					const sharedMidY =
						start.y + (lowestEndY - start.y) * midRatio;
			
					// ---- DRAW ----
					targets.forEach(({
						end
					}) => {
						const dx = end.x - start.x;
						const dy = end.y - start.y;
						const distance = Math.hypot(dx, dy);
			
						const isShort = distance < shortThreshold;
			
						const arrowWidth = isShort ?
							parseFloat(styles.getPropertyValue("--arrow-short-width")) || 5 :
							parseFloat(styles.getPropertyValue("--arrow-width")) || 8;
			
						const arrowHeight = isShort ?
							parseFloat(styles.getPropertyValue("--arrow-short-height")) || 6 :
							parseFloat(styles.getPropertyValue("--arrow-height")) || 10;
			
						const lineWidth = parseFloat(styles.getPropertyValue("--line-width"))
			
			
						let tipX, tipY, angle;
			
						if (isShort) {
							// ---- SHORT ARROW (centered) ----
							tipX = (start.x + end.x) / 2;
							tipY = (start.y + end.y) / 2 + arrowHeight / 2;
			
							const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
							line.setAttribute("x1", tipX);
							line.setAttribute("y1", tipY);
							line.setAttribute("x2", tipX);
							line.setAttribute("y2", tipY + 0.1);
			
							this.svg.appendChild(line);
			
							angle = Math.atan2(end.y - start.y, end.x - start.x);
						} else {
							// ---- LONG ARROW (right-angle path) ----
			
							tipX = end.x;
							tipY = end.y;
			
							// 3 segments:
							// 1. vertical down from start → sharedMidY
							// 2. horizontal → end.x
							// 3. vertical → end.y
			
							const extra = (start.x == end.x) ? 0 : (start.x > end.x) ? lineWidth / 2 : -lineWidth / 2
			
							const segments = [
								[start.x, start.y, start.x, sharedMidY],
								[start.x, sharedMidY, end.x - extra, sharedMidY],
								[end.x, sharedMidY, end.x, end.y - arrowHeight]
							];
			
							segments.forEach(([x1, y1, x2, y2]) => {
								const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
								line.setAttribute("x1", x1);
								line.setAttribute("y1", y1);
								line.setAttribute("x2", x2);
								line.setAttribute("y2", y2);
								this.svg.appendChild(line);
							});
			
			
							// Angle for arrowhead follows only the last segment
							const lastSegment = segments[segments.length - 1];
							const [lastX1, lastY1, lastX2, lastY2] = lastSegment;
							angle = Math.atan2(lastY2 - lastY1, lastX2 - lastX1);
						}
			
						// ---- ARROWHEAD ----
			
						const leftX = tipX - arrowHeight * Math.cos(angle) + (arrowWidth * Math.sin(angle)) / 2;
						const leftY = tipY - arrowHeight * Math.sin(angle) - (arrowWidth * Math.cos(angle)) / 2;
			
						const rightX = tipX - arrowHeight * Math.cos(angle) - (arrowWidth * Math.sin(angle)) / 2;
						const rightY = tipY - arrowHeight * Math.sin(angle) + (arrowWidth * Math.cos(angle)) / 2;
			
						const triangle = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
						triangle.setAttribute("points", `${tipX},${tipY} ${leftX},${leftY} ${rightX},${rightY}`);
						this.svg.appendChild(triangle);
					});
				}
			
			}
			
			customElements.define("arrow-connector", ArrowConnector);
